# Render Blueprint — one-click deploy.
# In Render: New → Blueprint → connect this repo. It provisions the web
# service and a free Postgres database, wires DATABASE_URL, and generates
# a SECRET_KEY. On first boot the app creates tables and loads all 1,231
# clubs automatically (AUTO_SEED).
services:
  - type: web
    name: eventully
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eventully-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"
      - key: SECURE_COOKIES
        value: "true"
      - key: SEED_DEMO_ACCOUNT
        value: "false"
      - key: REQUIRE_EDU_EMAIL
        value: "true"
      # Set this to YOUR email in the Render dashboard so you can approve club claims
      - key: ADMIN_EMAILS
        sync: false

databases:
  - name: eventully-db
    plan: free
