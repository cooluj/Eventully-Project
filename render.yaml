# Render Blueprint — one-click deploy.
# In Render: New → Blueprint → connect this repo. It provisions the web
# service and a free Postgres database, wires DATABASE_URL, and generates
# a SECRET_KEY. On first boot the app creates tables and loads all 1,231
# clubs automatically (AUTO_SEED).
services:
  - type: web
    name: eventully
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # Point this at an external Postgres (e.g. Neon free tier — Render's own
      # free Postgres is deleted 30 days after creation). Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: SECURE_COOKIES
        value: "true"
      - key: SEED_DEMO_ACCOUNT
        value: "false"
      - key: REQUIRE_EDU_EMAIL
        value: "true"
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "false"
      # Set this to YOUR email in the Render dashboard so you can approve club claims
      - key: ADMIN_EMAILS
        sync: false
      # Configure these to enable verification, reset, claim, team, and message emails.
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_USE_TLS
        value: "true"

databases:
  - name: eventully-db
    plan: free
