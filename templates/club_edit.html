{% extends "base.html" %}
{% block title %}Edit {{ club.name }}{% endblock %}

{% block content %}
<section class="section container">
  <form class="form-card" method="POST" style="max-width:560px;">
    <span class="eyebrow">Editing listing</span>
    <h2 style="margin-top:10px;">{{ club.name }}</h2>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="8">{{ club.description }}</textarea>
    </div>

    <button type="submit" class="btn btn-gold btn-block">Save changes</button>
    <a href="{{ url_for('officer.dashboard') }}" class="btn btn-ghost btn-block" style="margin-top:8px;">Back to officer dashboard</a>
  </form>
</section>
{% endblock %}
