{% extends "base.html" %}
{% block title %}{{ 'Edit event' if event else 'Post an event' }}{% endblock %}

{% block content %}
<section class="section container">
  <form class="form-card" method="POST" style="max-width:560px;">
    <span class="eyebrow">{{ club.name }}</span>
    <h2 style="margin-top:10px;">{{ 'Edit event' if event else 'Post a new event' }}</h2>

    <div class="field">
      <label for="name">Event name</label>
      <input type="text" id="name" name="name" value="{{ event.name if event else '' }}" required>
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4">{{ event.description if event else '' }}</textarea>
    </div>
    <div class="field">
      <label for="weekday">Day</label>
      <select id="weekday" name="weekday">
        {% for d in weekdays %}
          <option value="{{ d }}" {{ 'selected' if event and event.weekday == d }}>{{ d }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="time">Time</label>
      <input type="time" id="time" name="time" value="{{ event.time if event else '18:00' }}">
    </div>
    <div class="field">
      <label for="location">Location</label>
      <input type="text" id="location" name="location" value="{{ event.location if event else '' }}" placeholder="e.g. HUB 214">
    </div>
    <div class="field">
      <label for="capacity">Capacity</label>
      <input type="number" id="capacity" name="capacity" min="1" value="{{ event.capacity if event else 50 }}">
    </div>
    <div class="field">
      <label for="image_url">Image URL <span class="muted" style="font-weight:400;">(optional)</span></label>
      <input type="text" id="image_url" name="image_url" value="{{ event.image_url if event else '' }}">
    </div>
    <div class="field checkbox-row">
      <input type="checkbox" id="is_public" name="is_public" {{ 'checked' if not event or event.is_public }}>
      <label for="is_public" style="margin:0;">Open to all students (uncheck for members-only)</label>
    </div>

    <button type="submit" class="btn btn-gold btn-block">{{ 'Save changes' if event else 'Post event' }}</button>
    <a href="{{ url_for('officer.dashboard') }}" class="btn btn-ghost btn-block" style="margin-top:8px;">Cancel</a>
  </form>
</section>
{% endblock %}
