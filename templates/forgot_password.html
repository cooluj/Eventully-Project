{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}

{% block content %}
<section class="section container">
  <form class="form-card" method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <span class="eyebrow">Account recovery</span>
    <h2 style="margin-top:10px;">Reset your password</h2>
    <p class="muted" style="margin-bottom:24px;">Enter your Eventully email and we'll send a secure reset link that's valid for one hour.</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ email }}" autocomplete="email" required autofocus>
    </div>

    <button type="submit" class="btn btn-gold btn-block">Send reset link</button>
    <p class="muted" style="text-align:center; margin-top:18px; font-size:0.88rem;">
      Remembered it? <a href="{{ url_for('auth.login') }}" style="color:var(--purple); font-weight:700;">Log in</a>
    </p>
  </form>
</section>
{% endblock %}
