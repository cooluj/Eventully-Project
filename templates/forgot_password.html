{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}

{% block content %}
<section class="section container">
  <form class="form-card" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <span class="eyebrow">Account recovery</span>
    <h2 style="margin-top:8px;">Reset your password</h2>
    <p class="muted" style="font-size:0.9rem;">Enter your email and we'll send you a reset link that's valid for one hour.</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required autofocus>
    </div>

    <button type="submit" class="btn btn-block">Send reset link</button>
    <p class="muted" style="text-align:center; margin:14px 0 0; font-size:0.88rem;">
      Remembered it? <a href="{{ url_for('auth.login') }}" style="color:var(--purple); font-weight:700;">Log in</a>
    </p>
  </form>
</section>
{% endblock %}
