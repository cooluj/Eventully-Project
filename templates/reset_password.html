{% extends "base.html" %}
{% block title %}Choose a new password{% endblock %}

{% block content %}
<section class="section container">
  <form class="form-card" method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <span class="eyebrow">Account recovery</span>
    <h2 style="margin-top:8px;">Choose a new password</h2>

    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required autofocus>
      <p class="hint">At least 8 characters.</p>
    </div>

    <div class="field">
      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn btn-block">Set new password</button>
  </form>
</section>
{% endblock %}
